; Hunt Labs — CMDi/RCE/SSTI
; disable_functions is intentionally EMPTY for most labs.
; Per-lab restrictions are simulated in code (R6) or via PHP CLI subprocess.
disable_functions =
display_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
upload_max_filesize = 2M
post_max_size = 4M
session.cookie_httponly = 1
