services:
  hunt-labs:
    build: .
    ports:
      - "5000:5000"
    volumes:
      # Persist lab databases so progress and state survive container restarts.
      # Remove this volume to get a clean reset on next `docker compose up`.
      - hunt_labs_data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - FLASK_DEBUG=0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  hunt_labs_data:
