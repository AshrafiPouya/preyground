<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Hunt Labs{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="{{ url_for('index') }}">
      <span class="bracket">[</span>HUNT<span style="color:var(--text-muted)">_</span>LABS<span class="bracket">]</span>
    </a>
    <div class="nav-links">
      <a href="{{ url_for('index') }}">Hub</a>
      {% block nav_extra %}{% endblock %}
    </div>
    {% if total_labs %}
    <span class="nav-progress">{{ solved_labs | length }}/{{ total_labs }} solved</span>
    {% endif %}
  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
